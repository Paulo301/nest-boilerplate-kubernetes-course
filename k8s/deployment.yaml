apiVersion: apps/v1
kind: Deployment

metadata:
  name: app-ts
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 2
      maxUnavailable: 1
  selector:
    matchLabels:
      api: app-ts
  template:
    metadata:
      labels:
        api: app-ts
    spec:
      containers:
        - name: app-ts
          image: paulolemosdev/app-ts:v4
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: app-ts
            - secretRef:
                name: app-ts-secrets
          # env:
          #   - name: APP
          #     valueFrom:
          #       configMapKeyRef:
          #         key: app-name
          #         name: app-ts
          #   - name: API_KEY
          #     valueFrom:
          #       secretKeyRef:
          #         key: api-key
          #         name: app-ts-secrets
          resources:
            requests:
              memory: '64Mi'
              cpu: '100m'
            limits:
              memory: '128Mi'
              cpu: '200m'
          ports:
            - containerPort: 3000
